version: 2

models:
  - name: stg_owid__co2
    description: "Cleaned OWID CO2 dataset. One row per country per year."
    columns:
      - name: country_code
        description: "ISO 3166-1 alpha-3 country code"
        tests: [not_null]
      - name: reference_year
        tests: [not_null]
      - name: co2_mt
        description: "Total CO2 emissions in megatonnes"
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 40000
      - name: oil_co2_mt
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 10000

  - name: stg_worldbank__indicators
    description: "Cleaned World Bank energy and development indicators. One row per country per year."
    columns:
      - name: country_code
        tests: [not_null]
      - name: reference_year
        tests: [not_null]
      - name: renewable_energy_pct
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
      - name: electricity_access_pct
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
